<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Insect</title>
    <link rel="stylesheet" href="style/insect.css">
</head>
<body>
    <div class="screen">
        <h1>Catch the Insect</h1>
        <button class="btn" id="start-btn">Play Game</button>
    </div>
    <div class="screen">
        <h1>What is your "favorite" Insect?</h1>
        <ul class="insects-list">
            <li>
                <button class="choose-insect-btn">
                    <p>Fly</p>
                    <img src="Images/Fly.png" alt="fly">
                </button>
            </li>
             <li>
                <button class="choose-insect-btn">
                    <p>Mosquito</p>
                    <img src="Images/Mosquito.png" alt="mosquito">
                </button>
            </li>
             <li>
                <button class="choose-insect-btn">
                    <p>Spider</p>
                    <img src="Images/Spider.png" alt="spider">
                </button>
            </li>
             <li>
                <button class="choose-insect-btn">
                    <p>Roach</p>
                    <img src="Images/Roach.png" alt="roach">
                </button>
            </li>
        </ul>
    </div>


   <div class="screen game-container" id="game-container">
    <h3 class="time" id="id">Time: 00:00</h3>
    <h3 id="score" class="score">Score: 0</h3>
    <h5 id="message" class="message">Are you annoyed yet? <br>
    You are playing an impossible game!</h5>
   </div>
</body>
<script src="js/insect.js"></script>
</html>
